version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      # Group Anthropic SDK updates together - always want these fast
      anthropic:
        patterns:
          - "@anthropic-ai/*"
          - "ai"
          - "@ai-sdk/*"
      # Group Next.js + React together - they move in sync
      nextjs:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
      # Group Supabase together
      supabase:
        patterns:
          - "@supabase/*"
    # Don't auto-update major versions - review those manually
    versioning-strategy: auto
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
