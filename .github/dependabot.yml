version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    groups:
      # Group Anthropic SDK updates together - always want these fast
      anthropic:
        patterns:
          - '@anthropic-ai/*'
          - 'ai'
          - '@ai-sdk/*'
      # Group Next.js + React together - they move in sync
      nextjs:
        patterns:
          - 'next'
          - 'react'
          - 'react-dom'
          - '@types/react*'
      # Group Supabase together
      supabase:
        patterns:
          - '@supabase/*'
    versioning-strategy: auto
    open-pull-requests-limit: 10
    ignore:
      # Vite ecosystem: major/minor bumps cause OXC cross-platform lock file issues.
      # Only allow patch-level security fixes. Upgrade manually after testing.
      - dependency-name: 'vitest'
        update-types: ['version-update:semver-major', 'version-update:semver-minor']
      - dependency-name: '@vitejs/*'
        update-types: ['version-update:semver-major', 'version-update:semver-minor']
      - dependency-name: '@vitest/*'
        update-types: ['version-update:semver-major', 'version-update:semver-minor']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
